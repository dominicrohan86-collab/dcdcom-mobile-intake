# ============================================================================
# dcdcom-mobile-intake CI/CD
# ============================================================================

image: node:24.18.0-bookworm-slim

stages:
  - build
  - validate
  - test

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_PIPELINE_SOURCE == "web"'
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/'
    - when: never

variables:
  NODE_OPTIONS: '--max-old-space-size=4096'
  NPM_CONFIG_AUDIT: "false"
  NPM_CONFIG_FUND: "false"

default:
  tags:
    - dc-decom
  interruptible: true
  timeout: 20m

.base_job:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: on_success
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: on_success
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: on_success
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/'
      when: on_success
    - when: never

.node_job:
  extends: .base_job
  before_script:
    - |
      set -eu

      test -n "${NPM_CA_CERT:-}" || {
        echo "ERROR: NPM_CA_CERT is not available."
        echo "Create it as a GitLab CI/CD File variable."
        exit 1
      }

      test -s "$NPM_CA_CERT" || {
        echo "ERROR: NPM_CA_CERT does not point to a nonempty file."
        exit 1
      }

      grep -q 'BEGIN CERTIFICATE' "$NPM_CA_CERT" || {
        echo "ERROR: NPM_CA_CERT is not a PEM certificate bundle."
        exit 1
      }

      if grep -q 'PRIVATE KEY' "$NPM_CA_CERT"; then
        echo "ERROR: NPM_CA_CERT must not contain a private key."
        exit 1
      fi

      export NODE_EXTRA_CA_CERTS="$NPM_CA_CERT"
      export NPM_CONFIG_CAFILE="$NPM_CA_CERT"

      echo "Corporate CA configured for Node and npm."
    - node --version
    - npm --version
    - npm config get cafile
    - npm ping
    - npm ci --cache .npm --prefer-offline
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - .npm/
    policy: pull-push

drizzle_check:
  extends: .node_job
  stage: validate
  script:
    - npm run db:check

architecture_verify:
  extends: .node_job
  stage: validate
  script:
    - node scripts/release/verify.mjs

api_tests:
  extends: .node_job
  stage: test
  script:
    - npm run test:api

mobile_ui_tests:
  extends: .node_job
  stage: test
  script:
    - npm run test:mobile-ui

pwa_tests:
  extends: .node_job
  stage: test
  script:
    - npm run test:pwa

readiness_check:
  extends: .node_job
  stage: test
  script:
    - npm run readiness

release_check:
  extends: .node_job
  stage: test
  script:
    - npm run release:check

production_build:
  extends: .node_job
  stage: build
  script:
    - npm run build
    - npm run performance:budget
  artifacts:
    name: "dist-${CI_COMMIT_SHA}"
    when: always
    expire_in: 1 day
    paths:
      - dist/
