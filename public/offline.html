<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f4f6f0" />
    <title>DCDcom Intake Offline</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f4f6f0;
        color: #101827;
      }
      * { box-sizing: border-box; }
      body {
        min-height: 100dvh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      main {
        width: min(100%, 420px);
        border: 1px solid #d9dfd0;
        border-radius: 18px;
        background: #ffffff;
        padding: 24px;
        box-shadow: 0 18px 50px rgba(16, 24, 39, 0.12);
      }
      .mark {
        display: grid;
        width: 48px;
        height: 48px;
        place-items: center;
        border-radius: 14px;
        background: #163a67;
        color: #f7faf4;
        font-weight: 900;
        letter-spacing: 0;
      }
      h1 {
        margin: 18px 0 8px;
        font-size: 24px;
        line-height: 1.1;
      }
      p {
        margin: 0;
        color: #4d5b6b;
        font-size: 15px;
        line-height: 1.55;
      }
      button {
        min-height: 44px;
        margin-top: 18px;
        border: 0;
        border-radius: 10px;
        background: #163a67;
        color: #ffffff;
        padding: 0 16px;
        font: inherit;
        font-weight: 800;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark">DC</div>
      <h1>You are offline</h1>
      <p>DCDcom Intake can reopen once a connection is available. Any in-app drafts already saved on this device remain stored locally.</p>
      <button type="button" onclick="window.location.reload()">Try again</button>
    </main>
  </body>
</html>
